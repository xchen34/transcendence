user www-data;

events {
    worker_connections 768;
}

http {
    upstream t_game_server {
        hash $arg_roomid consistent;
        server t_game-1:9999;
        server t_game-2:9999;
        server t_game-3:9999;
    }

    limit_req_zone $binary_remote_addr zone=login_zone:10m rate=6r/m;
    limit_req_zone $binary_remote_addr zone=signup_zone:10m rate=6r/m;
    limit_req_zone $binary_remote_addr zone=avatar_zone:10m rate=30r/s;

    server{
        listen 80;
        server_name yourserver.name;

        return 301 https://$host$request_uri;
    }

    server{
        listen 0.0.0.0:443 ssl;

        server_name yourserver.name;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_certificate /etc/nginx/ssl/transcendence.crt;
        ssl_certificate_key /etc/nginx/ssl/transcendence.key;

        root    /var/www/html/;
        index   index.html;

        location = /api/users/ {
            limit_req zone=signup_zone burst=5 nodelay;
            proxy_pass http://t_user:9223;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;

            proxy_no_cache 1;
            proxy_cache_bypass 1;
        }

        location /api/users/ {
            proxy_pass http://t_user:9223;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;

            proxy_no_cache 1;
            proxy_cache_bypass 1;
        }

        location /api/avatar/ {
            limit_req zone=avatar_zone burst=35 nodelay;
            proxy_pass http://t_user:9223;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header Cookie $http_cookie;

            proxy_no_cache 1;
            proxy_cache_bypass 1;
        }

        location /api/auth {
            limit_req zone=login_zone burst=5 nodelay;
            proxy_pass http://t_user:9223;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;

            proxy_no_cache 1;
            proxy_cache_bypass 1;
        }

        location /api/logout {
            proxy_pass http://t_user:9223;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        #--------------------------------------secu--------
        location /api/me {
            proxy_pass http://t_user:9223;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_pass_header Set-Cookie;
            proxy_set_header Cookie $http_cookie;

            proxy_no_cache 1;
            proxy_cache_bypass 1;
        }

        location /api/2fa/setup {
            proxy_pass http://t_user:9223;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_pass_header Set-Cookie;
            proxy_set_header Cookie $http_cookie;

            proxy_no_cache 1;
            proxy_cache_bypass 1;
        }

        location /api/2fa/verify {
            proxy_pass http://t_user:9223;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_pass_header Set-Cookie;
            proxy_set_header Cookie $http_cookie;

            proxy_no_cache 1;
            proxy_cache_bypass 1;
        }
        #--------------------------------------secu--------

        location /api/record/ {
            limit_except GET {
                deny all;
            }
            proxy_pass http://t_record:9431;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header Cookie $http_cookie;

            proxy_no_cache 1;
            proxy_cache_bypass 1;
        }

        location /api/friends/ {
            proxy_pass http://t_friend:9766;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header Cookie $http_cookie;

            proxy_no_cache 1;
            proxy_cache_bypass 1;
        }

        location /api/wss/ {
            proxy_pass http://t_game_server;
            proxy_http_version 1.1;

            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "Upgrade";
            proxy_set_header Host $host;
        }

        location /api/msg_wss/ {
            proxy_pass http://t_broker:9555;
            proxy_http_version 1.1;

            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "Upgrade";
            proxy_set_header Host $host;
        }
    }

    include /etc/nginx/mime.types;
	default_type application/octet-stream;

    access_log /var/log/nginx/access.log;
	error_log /var/log/nginx/error.log;

}